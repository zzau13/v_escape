# Configuration for cargo-release
# https://github.com/crate-ci/cargo-release
# Supports workspaces using cargo's native flags, like --workspace or --package
#
# Note on package names: `{{package}}` resolves to the manifest `name` field.
# All workspace crates use the dashed convention (`v_escape-base`,
# `v_escape-codegen-base`, `v_escape-codegen`, `v_escape-proc-macro`, etc).
#
# When releasing several crates at once, drive cargo-release one package at a
# time (see `scripts/release.sh`). Pushing more than 3 tags in a single
# `git push` causes GitHub to silently drop the additional `push` events, so
# the `Release` workflow only fires for the first 3 tags.

# Allowed branches for releases
allow-branch = ["main", "master"]

# Push changes to remote
push = true

# Tag the release
tag = true

# Tag name format - using the manifest package name plus the version
# (e.g. `v_htmlescape-v0.16.0`, `v_escape-codegen-v0.2.0`).
tag-name = "{{package}}-v{{version}}"

# Tag message
tag-message = "Release {{package}} {{version}}"

# Pre-release commit message
pre-release-commit-message = "chore: prepare for {{package}} {{version}}"

# Pre-release hook to generate the changelog for the new tag
pre-release-hook = [
    "git-cliff",
    "--tag",
    "{{package}}-v{{version}}",
    "--output",
    "CHANGELOG.md",
]
